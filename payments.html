<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Платежи</title>
    <link href="https://cdn.jsdelivr.net/npm/vuetify@3.4.0/dist/vuetify.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.3.67/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="src/styles/base.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div class="main-container">
            <!-- Top -->
            <div class="top-section">
                <div class="page-tabs">
                    <div v-for="(tab, i) in pageTabs" :key="i"
                         :class="['page-tab', { active: tab.active, error: tab.error }]"
                         @click="selectPageTab(i)">
                        {{ tab.label }}
                        <svg class="close-icon" viewBox="0 0 10 10" @click.stop="closePageTab(i)">
                            <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5"/>
                            <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </div>
                </div>
                <div class="title-menu-section">
                    <div class="title-area">
                        <div class="back-btn" @click="goBack">
                            <img src="src/assets/icons/icon-arrow-back.svg" width="17" height="15" alt="">
                        </div>
                        <h1>Задача №199. Задача мониторинга. Кредит ID test5</h1>
                    </div>
                    <div class="nav-menu">
                        <div v-for="(item, i) in navItems" :key="i"
                             :class="['nav-item', { active: activeNav === i }]"
                             @click="onNav(i)">{{ item }}</div>
                    </div>
                </div>
            </div>

            <!-- Table 1: Графики -->
            <app-table title="Графики"
                :columns="scheduleColumns"
                :rows="scheduleRows"
                empty-text="Нет записей">
            </app-table>

            <!-- Collapsible: Фильтр платежей -->
            <div class="collapse-bar" @click="filterOpen = !filterOpen">
                <img class="collapse-icon" src="src/assets/icons/btn-plusbig.svg" width="24" height="24" alt="">
                <span>Фильтр платежей</span>
            </div>

            <!-- Table 2: Платежи -->
            <app-table title="Платежи"
                :columns="paymentColumns"
                :rows="paymentRows"
                empty-text="Нет записей">
            </app-table>

            <!-- Buttons -->
            <div class="action-buttons">
                <app-btn label="Назначить" @click="onAssign"></app-btn>
                <app-btn label="Назначить проверяющего" @click="onAssignReviewer"></app-btn>
                <app-btn label="Отменить" @click="onCancel"></app-btn>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.0/dist/vue.global.prod.js"></script>
    <script src="src/components/components.js"></script>
    <script>
        const { createApp, ref } = Vue;

        const app = createApp({
            setup() {
                const pageTabs = ref([
                    { label: '№ 12', active: true, error: false },
                    { label: '№ 199', active: false, error: true }
                ]);
                const navItems = UzComponents.navItems;
                const activeNav = ref(5);

                const filterOpen = ref(false);

                const scheduleColumns = [
                    { key: 'num', label: '№ п/п' },
                    { key: 'interval', label: 'Временной интервал' },
                    { key: 'currentDate', label: 'Текущая дата погашения' },
                    { key: 'totalAmount', label: 'Сумма итого' },
                    { key: 'monthlyPayment', label: 'Ежемесячный платеж' },
                    { key: 'principal', label: 'Основной долг' },
                    { key: 'interest', label: 'Начисленные проценты' },
                    { key: 'commission', label: 'Комиссия' },
                    { key: 'penalty', label: 'Штраф' },
                    { key: 'remainBefore', label: 'Оставшийся основной долг (до погашения)' },
                    { key: 'remainAfter', label: 'Оставшийся основной долг (после погашения)' },
                    { key: 'rate', label: 'Процентная ставка' },
                    { key: 'overdueDate', label: 'Дата просрочки' },
                    { key: 'status', label: 'Статус' }
                ];
                const scheduleRows = ref([]);

                const paymentColumns = [
                    { key: 'date', label: 'Дата' },
                    { key: 'totalAmount', label: 'Сумма итого' },
                    { key: 'currency', label: 'Валюта' },
                    { key: 'channel', label: 'Канал платежа' },
                    { key: 'principal', label: 'Основной долг' },
                    { key: 'commission', label: 'Комиссия' },
                    { key: 'overdueCommission', label: 'Просроченная комиссия' },
                    { key: 'commissionPenalty', label: 'Неустойки по комиссии' },
                    { key: 'overdueDebt', label: 'Просроченная задолженность' },
                    { key: 'accruedInterest', label: 'Начисленные проценты' },
                    { key: 'overdueInterest', label: 'Просроченные проценты' },
                    { key: 'penaltyPrincipal', label: 'Пеня на просроченный ОД' },
                    { key: 'penaltyInterest', label: 'Пеня на просроченные проценты' }
                ];
                const paymentRows = ref([]);

                function selectPageTab(i) { pageTabs.value.forEach((t, idx) => t.active = idx === i); }
                function closePageTab(i) { pageTabs.value.splice(i, 1); }
                function goBack() { window.location.href = 'monitoring_list.html'; }
                function onNav(i) { UzComponents.navigateTo(i); }
                function onAssign() { alert('Назначить'); }
                function onAssignReviewer() { alert('Назначить проверяющего'); }
                function onCancel() { alert('Отменить'); }

                return {
                    pageTabs, navItems, activeNav, filterOpen,
                    scheduleColumns, scheduleRows,
                    paymentColumns, paymentRows,
                    selectPageTab, closePageTab, goBack, onNav,
                    onAssign, onAssignReviewer, onCancel
                };
            }
        });

        UzComponents.registerAll(app);
        app.mount('#app');
    </script>
</body>
</html>
