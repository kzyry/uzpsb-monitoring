<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обеспечения</title>
    <link href="https://cdn.jsdelivr.net/npm/vuetify@3.4.0/dist/vuetify.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.3.67/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="src/styles/base.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div class="main-container">
            <!-- Top -->
            <div class="top-section">
                <div class="page-tabs">
                    <div v-for="(tab, i) in pageTabs" :key="i"
                         :class="['page-tab', { active: tab.active, error: tab.error }]"
                         @click="selectPageTab(i)">
                        {{ tab.label }}
                        <svg class="close-icon" viewBox="0 0 10 10" @click.stop="closePageTab(i)">
                            <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5"/>
                            <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </div>
                </div>
                <div class="title-menu-section">
                    <div class="title-area">
                        <div class="back-btn" @click="goBack">
                            <img src="src/assets/icons/icon-arrow-back.svg" width="17" height="15" alt="">
                        </div>
                        <h1>Задача №199. Задача мониторинга. Кредит ID test5</h1>
                    </div>
                    <div class="nav-menu">
                        <div v-for="(item, i) in navItems" :key="i"
                             :class="['nav-item', { active: activeNav === i }]"
                             @click="onNav(i)">{{ item }}</div>
                    </div>
                </div>
            </div>

            <!-- Field: Покрытие залогом (single field, no section border) -->
            <div class="field-row">
                <field-input label="Покрытие залогом кредита, всего %" v-model="coveragePercent"></field-input>
                <div class="field-group"></div>
                <div class="field-group"></div>
            </div>

            <!-- Table 1: Имущественное обеспечение -->
            <app-table title="Имущественное обеспечение"
                :columns="propertyColumns"
                :rows="propertyRows"
                footer-text="Строк: 0 – 1 из 0">
            </app-table>

            <!-- Table 2: Неимущественное обеспечение -->
            <app-table title="Неимущественное обеспечение"
                :columns="nonPropertyColumns"
                :rows="nonPropertyRows"
                footer-text="Строк: 0 – 1 из 0">
            </app-table>

            <!-- Buttons -->
            <div class="action-buttons">
                <app-btn label="Назначить" @click="onAssign"></app-btn>
                <app-btn label="Назначить проверяющего" @click="onAssignReviewer"></app-btn>
                <app-btn label="Отменить" @click="onCancel"></app-btn>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.0/dist/vue.global.prod.js"></script>
    <script src="src/components/components.js"></script>
    <script>
        const { createApp, ref, reactive } = Vue;

        const app = createApp({
            setup() {
                const pageTabs = ref([
                    { label: '№ 12', active: true, error: false },
                    { label: '№ 199', active: false, error: true }
                ]);
                const navItems = UzComponents.navItems;
                const activeNav = ref(3);

                const coveragePercent = ref('%');

                const propertyColumns = [
                    { key: 'type', label: 'Тип обеспечения' },
                    { key: 'address', label: 'Адрес и описание залога' },
                    { key: 'cadastral', label: 'Кадастровый номер / Номер кузова автомобиля' },
                    { key: 'commissionDate', label: 'Дата ввода в эксплуатацию(оборуд, недвиж) / Год выпуска (трансп)' },
                    { key: 'owner', label: 'Собственник' },
                    { key: 'inn', label: 'ИНН /ПИНФЛ залогодателя' },
                    { key: 'subsequent', label: 'Последующий/ Не последующий залог' },
                    { key: 'freePart', label: 'Свободная часть последующего залога' },
                    { key: 'estimatedCost', label: 'Оценочная стоимость (стоимость приобретения), сум' },
                    { key: 'pledgeAmount', label: 'Залоговая сумма' },
                    { key: 'coverage', label: 'Покрытие залогом кредита, %' },
                    { key: 'totalArea', label: 'Общая площадь, кв м.' },
                    { key: 'usedArea', label: 'Площадь используемая под строительство' },
                    { key: 'usableArea', label: 'Используемая площадь' },
                    { key: 'collateralId', label: 'ID Обеспечения' }
                ];
                const propertyRows = ref([]);

                const nonPropertyColumns = [
                    { key: 'type', label: 'Тип обеспечения' },
                    { key: 'name', label: 'Наименование' },
                    { key: 'category', label: 'Категория' },
                    { key: 'inn', label: 'ИНН /ПИНФЛ залогодателя' },
                    { key: 'currency', label: 'Валюта' },
                    { key: 'pledgeAmount', label: 'Залоговая сумма' },
                    { key: 'sumEquiv', label: 'Сумма экв, сум' },
                    { key: 'coverage', label: 'Покрытие залогом кредита, %' },
                    { key: 'collateralId', label: 'ID Обеспечения' }
                ];
                const nonPropertyRows = ref([]);

                function selectPageTab(i) { pageTabs.value.forEach((t, idx) => t.active = idx === i); }
                function closePageTab(i) { pageTabs.value.splice(i, 1); }
                function goBack() { window.location.href = 'monitoring_list.html'; }
                function onNav(i) { UzComponents.navigateTo(i); }
                function onAssign() { alert('Назначить'); }
                function onAssignReviewer() { alert('Назначить проверяющего'); }
                function onCancel() { alert('Отменить'); }

                return {
                    pageTabs, navItems, activeNav, coveragePercent,
                    propertyColumns, propertyRows,
                    nonPropertyColumns, nonPropertyRows,
                    selectPageTab, closePageTab, goBack, onNav,
                    onAssign, onAssignReviewer, onCancel
                };
            }
        });

        UzComponents.registerAll(app);
        app.mount('#app');
    </script>
</body>
</html>
