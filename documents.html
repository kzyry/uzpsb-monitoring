<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Документы</title>
    <link href="https://cdn.jsdelivr.net/npm/vuetify@3.4.0/dist/vuetify.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.3.67/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="src/styles/base.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div class="main-container">
            <!-- Top -->
            <div class="top-section">
                <div class="page-tabs">
                    <div v-for="(tab, i) in pageTabs" :key="i"
                         :class="['page-tab', { active: tab.active, error: tab.error }]"
                         @click="selectPageTab(i)">
                        {{ tab.label }}
                        <svg class="close-icon" viewBox="0 0 10 10" @click.stop="closePageTab(i)">
                            <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5"/>
                            <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </div>
                </div>
                <div class="title-menu-section">
                    <div class="title-area">
                        <div class="back-btn" @click="goBack">
                            <img src="src/assets/icons/icon-arrow-back.svg" width="17" height="15" alt="">
                        </div>
                        <h1>Задача №199. Задача мониторинга. Кредит ID test5</h1>
                    </div>
                    <div class="nav-menu">
                        <div v-for="(item, i) in navItems" :key="i"
                             :class="['nav-item', { active: activeNav === i }]"
                             @click="onNav(i)">{{ item }}</div>
                    </div>
                </div>
            </div>

            <!-- Toggle: Показать архивные документы -->
            <div class="toggle-row">
                <div :class="['toggle-switch', { active: showArchive }]" @click="showArchive = !showArchive">
                    <div class="toggle-thumb"></div>
                </div>
                <span class="toggle-label">Показать архивные документы</span>
            </div>

            <!-- Document panel: tree + table -->
            <div class="doc-panel">
                <div class="doc-tree">
                    <div class="doc-tree-title">Перечень документов</div>
                    <div class="doc-tree-items">
                        <div v-for="(group, gi) in docTree" :key="gi">
                            <div class="tree-item">
                                <div v-if="group.type === 'active'" class="tree-btn-active"></div>
                                <div v-else-if="group.type === 'collapsed'" class="tree-btn"><div class="tree-btn-plus"></div></div>
                                <div v-else class="tree-btn"><div class="tree-btn-line"></div></div>
                                <span :class="['tree-label', { 'tree-label-active': group.type === 'active' }]">{{ group.label }}</span>
                            </div>
                            <div v-for="(child, ci) in group.children" :key="ci" class="tree-item-child" style="margin-top: 10px;">
                                <div v-if="child.type === 'active'" class="tree-btn-active"></div>
                                <div v-else class="tree-btn"></div>
                                <span :class="['tree-label', { 'tree-label-active': child.type === 'active' }]">{{ child.label }}</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="doc-table-side">
                    <app-table title="Документы"
                        :columns="docColumns" :rows="docRows" empty-text="Нет записей"></app-table>
                </div>
            </div>

            <!-- Buttons -->
            <div class="action-buttons">
                <app-btn label="Назначить" @click="onAssign"></app-btn>
                <app-btn label="Назначить проверяющего" @click="onAssignReviewer"></app-btn>
                <app-btn label="Отменить" @click="onCancel"></app-btn>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.0/dist/vue.global.prod.js"></script>
    <script src="src/components/components.js"></script>
    <script>
        const { createApp, ref } = Vue;

        const app = createApp({
            setup() {
                const pageTabs = ref([
                    { label: '№ 12', active: true, error: false },
                    { label: '№ 199', active: false, error: true }
                ]);
                const navItems = UzComponents.navItems;
                const activeNav = ref(8);

                const showArchive = ref(false);

                const docTree = ref([
                    {
                        label: 'Документы по сделке',
                        type: 'expanded',
                        children: [
                            { label: 'КОД', type: 'active' },
                            { label: 'Решение КО', type: 'inactive' },
                            { label: 'Прочие документы', type: 'inactive' }
                        ]
                    },
                    { label: 'Документы по мониторингу', type: 'collapsed', children: [] },
                    { label: 'Обработка сигналов и мероприятия по урегулированию', type: 'collapsed', children: [] }
                ]);

                const docColumns = [
                    { key: 'docType', label: 'Тип документа' },
                    { key: 'createdDate', label: 'Дата создания' },
                    { key: 'docName', label: 'Наименование документа' },
                    { key: 'uploadedBy', label: 'Кем загружен' }
                ];
                const docRows = ref([]);

                function selectPageTab(i) { pageTabs.value.forEach((t, idx) => t.active = idx === i); }
                function closePageTab(i) { pageTabs.value.splice(i, 1); }
                function goBack() { window.location.href = 'monitoring_list.html'; }
                function onNav(i) { UzComponents.navigateTo(i); }
                function onAssign() { alert('Назначить'); }
                function onAssignReviewer() { alert('Назначить проверяющего'); }
                function onCancel() { alert('Отменить'); }

                return {
                    pageTabs, navItems, activeNav, showArchive,
                    docTree, docColumns, docRows,
                    selectPageTab, closePageTab, goBack, onNav,
                    onAssign, onAssignReviewer, onCancel
                };
            }
        });

        UzComponents.registerAll(app);
        app.mount('#app');
    </script>
</body>
</html>
