<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Основные данные</title>
    <link href="https://cdn.jsdelivr.net/npm/vuetify@3.4.0/dist/vuetify.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.3.67/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="src/styles/base.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div class="main-container">
            <!-- Top -->
            <div class="top-section">
                <div class="page-tabs">
                    <div v-for="(tab, i) in pageTabs" :key="i"
                         :class="['page-tab', { active: tab.active, error: tab.error }]"
                         @click="selectPageTab(i)">
                        {{ tab.label }}
                        <svg class="close-icon" viewBox="0 0 10 10" @click.stop="closePageTab(i)">
                            <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5"/>
                            <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </div>
                </div>
                <div class="title-menu-section">
                    <div class="title-area">
                        <div class="back-btn" @click="goBack">
                            <img src="src/assets/icons/icon-arrow-back.svg" width="17" height="15" alt="">
                        </div>
                        <h1>Задача №199. Задача мониторинга. Кредит ID test5</h1>
                    </div>
                    <div class="nav-menu">
                        <div v-for="(item, i) in navItems" :key="i"
                             :class="['nav-item', { active: activeNav === i }]"
                             @click="onNav(i)">{{ item }}</div>
                    </div>
                </div>
            </div>

            <!-- Section 1: Данные клиента (3 equal columns) -->
            <div class="fields-section">
                <div class="section-title">Данные клиента</div>
                <div class="field-row">
                    <field-input label="Уникальный код клиента" v-model="clientData.code"></field-input>
                    <field-input label="Клиент наименование" v-model="clientData.name"></field-input>
                    <field-input label="Тип заёмщика наименование" v-model="clientData.borrowerType"></field-input>
                </div>
            </div>

            <!-- Section 2: Основные реквизиты -->
            <div class="fields-section">
                <div class="section-title">Основные реквизиты</div>
                <!-- Row 1: field-box(2) | single | field-box(2) -->
                <div class="field-row">
                    <div class="field-box">
                        <field-input label="Номер кредитного договора" v-model="requisites.contractNumber"></field-input>
                        <field-date label="Дата кредитного договора" v-model="requisites.contractDate"></field-date>
                    </div>
                    <field-input label="Тип договора" v-model="requisites.contractType"></field-input>
                    <div class="field-box">
                        <field-input label="ID Договора" v-model="requisites.contractId"></field-input>
                        <field-input label="Номер заявки" v-model="requisites.applicationNumber"></field-input>
                    </div>
                </div>
                <!-- Row 2: field-box(2) | field-box(2) | field-box(2) -->
                <div class="field-row">
                    <div class="field-box">
                        <field-date label="Дата начала договора" v-model="requisites.startDate"></field-date>
                        <field-date label="Дата окончания договора" v-model="requisites.endDate"></field-date>
                    </div>
                    <div class="field-box">
                        <field-input label="Срок кредита, мес" v-model="requisites.term"></field-input>
                        <field-input label="Цель кредита" v-model="requisites.purpose"></field-input>
                    </div>
                    <div class="field-box">
                        <field-input label="Сумма кредита" v-model="requisites.amount"></field-input>
                        <field-input label="Валюта, Код" v-model="requisites.currencyCode"></field-input>
                    </div>
                </div>
            </div>

            <!-- Section 3: Класс качества + Вид кредитования -->
            <div class="fields-section">
                <div class="field-row">
                    <field-select label="Класс качества активов" v-model="requisites.assetQualityClass" :options="[]"></field-select>
                    <div class="field-box">
                        <field-input label="Вид кредитования, Код" v-model="requisites.creditTypeCode"></field-input>
                        <field-input label="Вид кредитования, Наименование" v-model="requisites.creditTypeName"></field-input>
                    </div>
                </div>
            </div>

            <!-- Section 4: Экономический сектор + ОКЭД -->
            <div class="fields-section">
                <div class="field-row">
                    <field-input label="Экономический сектор, Код" v-model="requisites.sectorCode"></field-input>
                    <field-input label="Экономический сектор, Наименование" v-model="requisites.sectorName"></field-input>
                    <field-input label="ОКЭД, Код" v-model="requisites.okedCode"></field-input>
                </div>
            </div>

            <!-- Buttons (right aligned) -->
            <div class="action-buttons">
                <app-btn label="Назначить" @click="onAssign"></app-btn>
                <app-btn label="Назначить проверяющего" @click="onAssignReviewer"></app-btn>
                <app-btn label="Отменить" @click="onCancel"></app-btn>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.0/dist/vue.global.prod.js"></script>
    <script src="src/components/components.js"></script>
    <script>
        const { createApp, ref, reactive } = Vue;

        const app = createApp({
            setup() {
                const pageTabs = ref([
                    { label: '№ 12', active: true, error: false },
                    { label: '№ 199', active: false, error: true }
                ]);
                const navItems = UzComponents.navItems;
                const activeNav = ref(1);

                const clientData = reactive({
                    code: '',
                    name: 'test1',
                    borrowerType: 'Юридическое лицо'
                });

                const requisites = reactive({
                    contractNumber: '91000',
                    contractDate: '05.04.2025',
                    contractType: '',
                    contractId: 'test5',
                    applicationNumber: 'test',
                    startDate: '02.11.2021',
                    endDate: '02.11.2022',
                    term: '36',
                    purpose: 'test',
                    amount: '800000',
                    currencyCode: '0',
                    assetQualityClass: '',
                    creditTypeCode: '34',
                    creditTypeName: 'Автокредит',
                    sectorCode: '15270',
                    sectorName: '(15270) Мебельная промышленность',
                    okedCode: ''
                });

                function selectPageTab(i) { pageTabs.value.forEach((t, idx) => t.active = idx === i); }
                function closePageTab(i) { pageTabs.value.splice(i, 1); }
                function goBack() { window.location.href = 'monitoring_list.html'; }
                function onNav(i) { UzComponents.navigateTo(i); }
                function onAssign() { alert('Назначить'); }
                function onAssignReviewer() { alert('Назначить проверяющего'); }
                function onCancel() { alert('Отменить'); }

                return {
                    pageTabs, navItems, activeNav,
                    clientData, requisites,
                    selectPageTab, closePageTab, goBack, onNav,
                    onAssign, onAssignReviewer, onCancel
                };
            }
        });

        UzComponents.registerAll(app);
        app.mount('#app');
    </script>
</body>
</html>
