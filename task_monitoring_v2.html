<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задача мониторинга (V2)</title>
    <link href="https://cdn.jsdelivr.net/npm/vuetify@3.4.0/dist/vuetify.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.3.67/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="src/styles/base.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div class="main-container">
            <!-- Top -->
            <div class="top-section">
                <div class="page-tabs">
                    <div v-for="(tab, i) in pageTabs" :key="i"
                         :class="['page-tab', { active: tab.active, error: tab.error }]"
                         @click="selectPageTab(i)">
                        {{ tab.label }}
                        <svg class="close-icon" viewBox="0 0 10 10" @click.stop="closePageTab(i)">
                            <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5"/>
                            <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </div>
                </div>
                <div class="title-menu-section">
                    <div class="title-area">
                        <div class="back-btn" @click="goBack">
                            <img src="src/assets/icons/icon-arrow-back.svg" width="17" height="15" alt="">
                        </div>
                        <h1>Задача №{{ taskData.taskNumber }}. Задача мониторинга. Кредит ID {{ taskData.creditId }}</h1>
                        <div class="version-toggle">
                            <div class="version-btn" @click="switchVersion">Версия 1</div>
                            <div class="version-btn active">Версия 2</div>
                        </div>
                    </div>
                    <div class="nav-menu">
                        <div v-for="(item, i) in localNavItems" :key="i"
                             :class="['nav-item', { active: activeNav === i }]"
                             @click="onNav(i)">{{ item }}</div>
                    </div>
                </div>
            </div>

            <!-- ============================================ -->
            <!-- TAB 0: Задание                               -->
            <!-- ============================================ -->
            <template v-if="activeNav === 0">

                <!-- Section 1: Task info -->
                <div class="fields-section">
                    <div class="field-row">
                        <field-input label="Номер задачи" v-model="taskData.taskNumber2"></field-input>
                        <div class="field-box">
                            <field-date label="Дата создания" v-model="taskData.createdDate"></field-date>
                            <field-input label="Статус задачи" v-model="taskData.status"></field-input>
                        </div>
                        <field-input label="Приоритет" v-model="taskData.priority"></field-input>
                    </div>
                    <div class="field-row">
                        <field-input label="Тип задачи" v-model="taskData.taskType"></field-input>
                        <field-input label="Вид мониторинга" v-model="taskData.monitoringType"></field-input>
                        <field-input label="Исполнитель" v-model="taskData.executor"></field-input>
                    </div>
                    <div class="field-row">
                        <field-date label="Дата назначения" v-model="taskData.assignDate"></field-date>
                        <field-date label="Срок выполнения" v-model="taskData.deadline"></field-date>
                        <field-date label="Фактическая дата выполнения" v-model="taskData.completionDate"></field-date>
                    </div>
                </div>

                <!-- Section 2: Credit info -->
                <div class="fields-section">
                    <div class="section-title">Информация о кредите</div>
                    <div class="field-row">
                        <div class="field-box">
                            <field-input label="ФИО/Наименование заемщика" v-model="creditData.borrowerName"></field-input>
                            <field-input label="Тип договора" v-model="creditData.contractType"></field-input>
                        </div>
                        <field-input label="Номер кредитного договора" v-model="creditData.contractNumber"></field-input>
                        <div class="field-box">
                            <field-date label="Дата начала договора" v-model="creditData.startDate"></field-date>
                            <field-date label="Дата окончания договора" v-model="creditData.endDate"></field-date>
                        </div>
                    </div>
                    <div class="field-row">
                        <div class="field-box">
                            <field-input label="Сумма кредита" v-model="creditData.amount"></field-input>
                            <field-input label="Валюта" v-model="creditData.currency"></field-input>
                        </div>
                        <field-select label="Класс обеспечения" v-model="creditData.collateralClass"
                            :options="['Стандартные', 'Субстандартные', 'Сомнительные']"></field-select>
                        <field-input label="Цель кредита" v-model="creditData.purpose"></field-input>
                    </div>
                </div>

                <!-- Section 3: Monitoring conditions -->
                <div class="fields-section">
                    <div style="display: flex; flex-direction: column; gap: 12px; padding-bottom: 16px;">
                        <div class="section-subtitle">Мониторинг условий</div>
                        <div class="section-subtitle" style="font-size: 16px; padding-left: 8px;">Условие КО, кредитной программы</div>
                    </div>
                    <div class="field-row" style="align-items: flex-start;">
                        <field-input label="Условие" v-model="monitoringData.condition" textarea></field-input>
                        <field-input label="Дата мониторинга" v-model="monitoringData.monitoringDate"></field-input>
                    </div>
                    <div class="field-row">
                        <field-select label="Вывод" v-model="monitoringData.conclusion" required
                            :options="['Соответствует', 'Не соответствует', 'Частично']" style="flex: 0.5;"></field-select>
                        <div class="field-group" style="flex: 0.5;"></div>
                    </div>
                    <div class="field-row">
                        <field-input label="Комментарий" v-model="monitoringData.comment" textarea></field-input>
                    </div>
                </div>

                <!-- Section 4: Signals -->
                <div class="fields-section">
                    <div class="section-title">Сигналы</div>
                    <div class="checkbox-group">
                        <app-checkbox v-for="(signal, i) in signals" :key="i"
                            :label="signal.label" v-model="signal.checked"></app-checkbox>
                    </div>
                </div>

                <!-- Section 5: Documents panel -->
                <div class="doc-panel">
                    <div class="doc-tree">
                        <div class="doc-tree-title">Перечень документов</div>
                        <div class="doc-tree-items">
                            <div v-for="(group, gi) in docTree" :key="gi">
                                <div class="tree-item">
                                    <div class="tree-btn"><div class="tree-btn-line"></div></div>
                                    <span class="tree-label">{{ group.label }}</span>
                                </div>
                                <div v-for="(child, ci) in group.children" :key="ci" class="tree-item-child" style="margin-top: 10px;">
                                    <div class="tree-btn-active"></div>
                                    <span class="tree-label">{{ child.label }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="doc-table-side">
                        <app-table title="Документы"
                            :columns="docColumns" :rows="docRows" empty-text="Нет записей"></app-table>
                    </div>
                </div>

                <!-- Section 6: Bottom tables -->
                <div class="bottom-tables">
                    <app-table title="История выполнения задачи"
                        :columns="historyColumns" :rows="historyRows" footer-text="Строк: 2"></app-table>
                    <app-table title="Комментарии по задаче"
                        :columns="commentColumns" :rows="commentRows" empty-text="Нет записей"></app-table>
                </div>

                <!-- Buttons -->
                <div class="action-buttons">
                    <app-btn label="Назначить" @click="onAssign"></app-btn>
                    <app-btn label="Назначить проверяющего" @click="onAssignReviewer"></app-btn>
                    <app-btn label="Отменить" @click="onCancel"></app-btn>
                </div>

            </template>

            <!-- ============================================ -->
            <!-- TAB 1: Акт мониторинга                       -->
            <!-- ============================================ -->
            <template v-if="activeNav === 1">

                <!-- State: act not created -->
                <template v-if="actState === 'none'">
                    <div class="fields-section">
                        <div class="section-title">Создание акта мониторинга</div>
                        <div class="field-row">
                            <field-select label="Вид мониторинга" v-model="actData.monitoringType" editable
                                :options="['Мониторинг целевого использования', 'Инспекционный мониторинг', 'Мониторинг обеспечения']"></field-select>
                            <template v-if="actData.monitoringType === 'Инспекционный мониторинг'">
                                <field-select label="Шаблон мониторинга" v-model="actData.template" editable
                                    :options="['Мониторинг кредитов на оборотные средства', 'Инвестиционный мониторинг', 'Текущий мониторинг']"></field-select>
                            </template>
                            <template v-else>
                                <div class="field-group"></div>
                            </template>
                            <div class="field-group"></div>
                        </div>
                        <div v-if="actData.monitoringType === 'Мониторинг обеспечения'" style="padding: 8px 0; color: #737373; font-size: 13px;">
                            Акт не создаётся для данного вида мониторинга.
                        </div>
                        <template v-if="actData.monitoringType !== 'Мониторинг обеспечения'">
                            <div class="field-row">
                                <field-select label="ИД кредита" v-model="actData.creditId" editable
                                    :options="['test5', 'test6', 'test7']"></field-select>
                                <field-input label="Сумма кредита" v-model="actData.creditAmount"></field-input>
                                <field-input label="Валюта" v-model="actData.creditCurrency"></field-input>
                            </div>
                            <div class="action-buttons" style="justify-content: flex-start; padding-top: 8px;">
                                <app-btn label="Сформировать акт" primary @click="createAct"></app-btn>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- State: act created -->
                <template v-if="actState === 'created'">

                    <!-- Act status bar -->
                    <div class="fields-section">
                        <div class="section-title">{{ actData.actType }}</div>
                        <div class="act-status-row">
                            <span class="act-status-label">Статус: {{ actData.status }}</span>
                            <div class="progress-group">
                                <span class="progress-label">Заполнено:</span>
                                <div class="progress-bar">
                                    <div class="progress-fill" :style="{ width: actData.progress + '%' }"></div>
                                </div>
                                <span class="progress-percent">{{ actData.progress }}%</span>
                            </div>
                        </div>
                        <div class="action-buttons" style="justify-content: flex-start; padding-top: 8px;">
                            <app-btn label="Сформировать документ" @click="generateDoc"></app-btn>
                            <app-btn label="Удалить акт" @click="deleteAct"></app-btn>
                        </div>
                    </div>

                    <!-- ======================================== -->
                    <!-- TARGET USE: Мониторинг целевого исп.     -->
                    <!-- ======================================== -->
                    <template v-if="isTargetUse">

                        <!-- TU Section 1: Сведения о заёмщике -->
                        <div class="fields-section">
                            <div class="section-title">1. Сведения о заёмщике</div>
                            <div class="field-row">
                                <field-input label="Наименование заёмщика" v-model="tu.borrower.name"></field-input>
                                <field-input label="ИНН" v-model="tu.borrower.inn"></field-input>
                                <field-input label="Сегмент" v-model="tu.borrower.segment"></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Адрес" v-model="tu.borrower.address"></field-input>
                                <field-input label="Вид деятельности" v-model="tu.borrower.activity"></field-input>
                                <field-input label="Код ОКОНХ" v-model="tu.borrower.okonh"></field-input>
                            </div>
                        </div>

                        <!-- TU Section 2: Сведения о кредите -->
                        <div class="fields-section">
                            <div class="section-title">2. Сведения о кредите</div>
                            <div class="field-row">
                                <field-input label="Наименование банка" v-model="tu.credit.bank"></field-input>
                                <field-input label="Номер кредитного договора" v-model="tu.credit.contractNumber"></field-input>
                                <field-date label="Дата договора" v-model="tu.credit.contractDate"></field-date>
                            </div>
                            <div class="field-row">
                                <div class="field-box">
                                    <field-input label="Сумма кредита" v-model="tu.credit.amount"></field-input>
                                    <field-input label="Валюта" v-model="tu.credit.currency"></field-input>
                                </div>
                                <field-date label="Дата выдачи" v-model="tu.credit.issueDate"></field-date>
                                <field-date label="Дата погашения" v-model="tu.credit.maturityDate"></field-date>
                            </div>
                            <div class="field-row">
                                <field-input label="Цель кредита" v-model="tu.credit.purpose"></field-input>
                                <field-input label="Процентная ставка" v-model="tu.credit.rate"></field-input>
                                <field-date label="Дата ввода проекта" v-model="tu.credit.projectDate" editable></field-date>
                            </div>
                            <div class="field-row">
                                <field-input label="Рабочие места (план)" v-model="tu.credit.jobsPlan" editable></field-input>
                                <field-input label="Рабочие места (факт)" v-model="tu.credit.jobsFact" editable></field-input>
                                <div class="field-group"></div>
                            </div>
                            <div class="field-row" v-if="Number(tu.credit.jobsFact) < Number(tu.credit.jobsPlan)">
                                <field-input label="Причина несоздания рабочих мест" v-model="tu.credit.jobsReason" editable textarea required></field-input>
                            </div>
                        </div>

                        <!-- TU Section 3: Использование средств -->
                        <div class="fields-section">
                            <div class="section-title">3. Использование средств</div>
                            <app-table title="Договоры поставки"
                                :columns="tu.supplyColumns" :rows="tu.supplyRows" empty-text="Нет записей"></app-table>
                            <app-table title="Полученные товары"
                                :columns="tu.goodsColumns" :rows="tu.goodsRows" empty-text="Нет записей"></app-table>
                            <app-table title="Использование оборудования"
                                :columns="tu.equipColumns" :rows="tu.equipRows" empty-text="Нет записей"></app-table>
                        </div>

                        <!-- TU Section 4: Результаты -->
                        <div class="fields-section">
                            <div class="section-title">4. Результаты</div>
                            <div class="field-row">
                                <field-input label="Фактическое использование кредитных средств" v-model="tu.results.factUsage" editable textarea></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Фотоматериалы" v-model="tu.results.photos" editable></field-input>
                                <div class="field-group"></div>
                                <div class="field-group"></div>
                            </div>
                            <div class="field-row">
                                <field-input label="Выявленные обстоятельства" v-model="tu.results.findings" editable textarea></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Заключение" v-model="tu.results.conclusion" editable textarea></field-input>
                            </div>
                        </div>

                    </template>

                    <!-- ======================================== -->
                    <!-- WORKING CAPITAL / INVESTMENT (common)    -->
                    <!-- ======================================== -->
                    <template v-if="isWorkingCapital || isInvestment">

                        <!-- Section 0: Заголовок акта -->
                        <div class="fields-section">
                            <div class="section-title">Заголовок акта</div>
                            <div class="field-row">
                                <field-input label="Наименование юр. лица" v-model="wc.header.orgName"></field-input>
                                <field-input label="Территориальное управление" v-model="wc.header.branch" editable></field-input>
                                <field-input label="ЦБУ" v-model="wc.header.cbu"></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Сотрудник мониторинга" v-model="wc.header.employee" editable></field-input>
                                <field-date label="Дата мониторинга" v-model="wc.header.monitoringDate" editable></field-date>
                                <field-input label="ID клиента" v-model="wc.header.clientId"></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Номер кредита" v-model="wc.header.creditNumber"></field-input>
                                <field-input label="Курс USD" v-model="wc.header.rateUSD" editable></field-input>
                                <div class="field-box">
                                    <field-input label="Курс EUR" v-model="wc.header.rateEUR" editable></field-input>
                                    <field-input label="Курс RUB" v-model="wc.header.rateRUB" editable></field-input>
                                </div>
                            </div>
                        </div>

                        <!-- Section 1: Общая информация -->
                        <div class="fields-section">
                            <div class="section-title">1. Общая информация</div>
                            <div class="field-row">
                                <field-input label="Валюта кредита" v-model="wc.general.currency"></field-input>
                                <field-input label="Сумма (номинал)" v-model="wc.general.amountNominal"></field-input>
                                <field-input label="Сумма (сум экв.)" v-model="wc.general.amountUZS"></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Остаток (номинал)" v-model="wc.general.balanceNominal"></field-input>
                                <field-input label="Остаток (сум экв.)" v-model="wc.general.balanceUZS"></field-input>
                                <div class="field-group"></div>
                            </div>
                            <div class="field-row">
                                <field-date label="Дата договора" v-model="wc.general.contractDate"></field-date>
                                <field-date label="Дата погашения" v-model="wc.general.maturityDate"></field-date>
                                <field-input label="Срок кредита" v-model="wc.general.creditTerm"></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Цель кредита" v-model="wc.general.purpose" textarea></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Товары по кредиту" v-model="wc.general.goods" textarea editable></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Сегмент клиента" v-model="wc.general.segment"></field-input>
                                <field-input label="Деятельность" v-model="wc.general.activity"></field-input>
                                <div class="field-group"></div>
                            </div>
                            <div class="field-row">
                                <field-input label="Судебные разбирательства" v-model="wc.general.courtCases"></field-input>
                                <field-input label="Задолженность в МИБ" v-model="wc.general.mibDebt"></field-input>
                                <field-select label="Изменения учредителей" v-model="wc.general.founderChanges" editable
                                    :options="['Да', 'Нет']"></field-select>
                            </div>
                            <div class="field-row">
                                <field-select label="Вторичный р/счет" v-model="wc.general.secondaryAccount" editable
                                    :options="['Да', 'Нет']"></field-select>
                                <div class="field-group"></div>
                                <div class="field-group"></div>
                            </div>
                            <app-table title="Просроченная задолженность по погашенным кредитам"
                                :columns="wc.overdueClosedCols" :rows="wc.overdueClosedRows" empty-text="Нет записей"></app-table>
                            <app-table title="Просроченная задолженность по действующим кредитам"
                                :columns="wc.overdueActiveCols" :rows="wc.overdueActiveRows" empty-text="Нет записей"></app-table>
                        </div>

                        <!-- Section 2: Информация по имеющимся кредитам -->
                        <div class="fields-section">
                            <div class="section-title">2. Информация по имеющимся кредитам</div>
                            <app-table title="Кредиты"
                                :columns="wc.creditsCols" :rows="wc.creditsRows" empty-text="Нет записей"></app-table>
                        </div>

                        <!-- Section 3: Связанные предприятия -->
                        <div class="fields-section">
                            <div class="section-title">3. Связанные предприятия</div>
                            <app-table title="Связанные предприятия"
                                :columns="wc.relatedCols" :rows="wc.relatedRows" empty-text="Нет записей"></app-table>
                        </div>

                        <!-- Section 4: Финансовое положение -->
                        <div class="fields-section">
                            <div class="section-title">4. Финансовое положение</div>
                            <app-table title="Баланс (по нац. стандартам)"
                                :columns="wc.balanceCols" :rows="wc.balanceRows" empty-text="Нет данных"></app-table>
                            <app-table title="Форма №2 — Отчёт о финансовых результатах"
                                :columns="wc.incomeCols" :rows="wc.incomeRows" empty-text="Нет данных"></app-table>
                        </div>

                        <!-- Section 5: Долговая нагрузка -->
                        <div class="fields-section">
                            <div class="section-title">5. Долговая нагрузка</div>
                            <div class="field-row">
                                <field-input label="Среднемесячный платёж" v-model="wc.debtLoad.monthlyPayment"></field-input>
                                <field-input label="Среднемесячный доход" v-model="wc.debtLoad.monthlyIncome"></field-input>
                                <field-input label="Кредитная нагрузка (%)" v-model="wc.debtLoad.loadPercent"></field-input>
                            </div>
                        </div>

                        <!-- Section 6: Обороты расчетного счёта -->
                        <div class="fields-section">
                            <div class="section-title">6. Обороты расчетного счёта</div>
                            <app-table title="Обороты за 12 месяцев"
                                :columns="wc.turnoverCols" :rows="wc.turnoverRows" :footer-text="'Строк: ' + wc.turnoverRows.length"></app-table>
                        </div>

                        <!-- Section 7: Отчёт по НДС -->
                        <div class="fields-section">
                            <div class="section-title">7. Отчёт по НДС</div>
                            <app-table title="Выручка от реализации (НДС)"
                                :columns="wc.vatCols" :rows="wc.vatRows" :footer-text="'Строк: ' + wc.vatRows.length"></app-table>
                        </div>

                        <!-- Section 8: Адрес деятельности -->
                        <div class="fields-section">
                            <div class="section-title">8. Адрес деятельности</div>
                            <app-table title="Адреса деятельности"
                                :columns="wc.addressCols" :rows="wc.addressRows" empty-text="Нет записей"></app-table>
                        </div>

                        <!-- Section 9: Картотека-2 -->
                        <div class="fields-section">
                            <div class="section-title">9. Картотека-2</div>
                            <div class="field-row">
                                <field-input label="Сумма картотеки" v-model="wc.kartoteka.amount"></field-input>
                                <div class="field-group"></div>
                                <div class="field-group"></div>
                            </div>
                            <template v-if="Number(wc.kartoteka.amount) > 0">
                                <div class="field-row">
