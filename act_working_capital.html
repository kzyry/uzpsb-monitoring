<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Акт мониторинга — Оборотные средства</title>
    <link href="https://cdn.jsdelivr.net/npm/vuetify@3.4.0/dist/vuetify.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.3.67/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="src/styles/base.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div class="main-container">
            <!-- Top: page tabs -->
            <div class="top-section">
                <div class="page-tabs">
                    <div v-for="(tab, i) in pageTabs" :key="i"
                         :class="['page-tab', { active: tab.active }]"
                         @click="pageTabs.forEach((t, idx) => t.active = idx === i)">
                        {{ tab.label }}
                        <svg class="close-icon" viewBox="0 0 10 10" @click.stop="pageTabs.splice(i, 1)">
                            <line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5"/>
                            <line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Act header -->
            <div class="act-header">
                <div class="act-header-top">
                    <div class="back-btn" @click="goBack">
                        <img src="src/assets/icons/icon-arrow-back.svg" width="17" height="15" alt="">
                    </div>
                    <h1>Акт мониторинга кредитов на оборотные средства. Кредит ID test5</h1>
                </div>
                <div class="act-status-row">
                    <span class="act-status-label">Статус: {{ actStatus }}</span>
                    <div class="progress-group">
                        <span class="progress-label">Заполнено:</span>
                        <div class="progress-bar">
                            <div class="progress-fill" :style="{ width: actProgress + '%' }"></div>
                        </div>
                        <span class="progress-percent">{{ actProgress }}%</span>
                    </div>
                </div>
            </div>

            <!-- Sidebar + Content -->
            <div class="act-layout">
                <!-- Sidebar -->
                <div class="act-sidebar">
                    <div class="act-sidebar-title">Разделы</div>
                    <div :class="['act-sidebar-item', { active: activeSection === 0 }]"
                         @click="activeSection = 0">Заголовок акта</div>
                    <div v-for="(section, i) in sections" :key="i"
                         :class="['act-sidebar-item', { active: activeSection === i + 1 }]"
                         @click="activeSection = i + 1">
                        {{ i + 1 }}. {{ section }}
                    </div>
                </div>

                <!-- Content -->
                <div class="act-content">

                    <!-- Section 0: Заголовок акта -->
                    <template v-if="activeSection === 0">
                        <div class="section-title">Заголовок акта</div>
                        <div class="fields-section" style="border: none; padding: 0;">
                            <div class="field-row">
                                <field-input label="Наименование юр. лица" v-model="header.orgName"></field-input>
                                <field-input label="Территориальное управление" v-model="header.branch" editable></field-input>
                                <field-input label="ЦБУ" v-model="header.cbu"></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Сотрудник мониторинга" v-model="header.employee" editable></field-input>
                                <field-date label="Дата мониторинга" v-model="header.monitoringDate" editable></field-date>
                                <field-input label="ID клиента" v-model="header.clientId"></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Номер кредита" v-model="header.creditNumber"></field-input>
                                <field-input label="Курс USD" v-model="header.rateUSD" editable></field-input>
                                <div class="field-box">
                                    <field-input label="Курс EUR" v-model="header.rateEUR" editable></field-input>
                                    <field-input label="Курс RUB" v-model="header.rateRUB" editable></field-input>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- Section 1: Общая информация -->
                    <template v-if="activeSection === 1">
                        <div class="section-title">Общая информация</div>
                        <div class="fields-section" style="border: none; padding: 0;">
                            <div class="field-row">
                                <field-input label="Валюта кредита" v-model="general.currency"></field-input>
                                <field-input label="Сумма (номинал)" v-model="general.amountNominal"></field-input>
                                <field-input label="Сумма (сум экв.)" v-model="general.amountUZS"></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Остаток (номинал)" v-model="general.balanceNominal"></field-input>
                                <field-input label="Остаток (сум экв.)" v-model="general.balanceUZS"></field-input>
                                <div class="field-group"></div>
                            </div>
                            <div class="field-row">
                                <field-date label="Дата договора" v-model="general.contractDate"></field-date>
                                <field-date label="Дата погашения" v-model="general.maturityDate"></field-date>
                                <field-input label="Срок кредита" v-model="general.creditTerm"></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Цель кредита" v-model="general.purpose" textarea></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Товары по кредиту" v-model="general.goods" textarea editable></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Сегмент клиента" v-model="general.segment"></field-input>
                                <field-input label="Деятельность" v-model="general.activity"></field-input>
                                <div class="field-group"></div>
                            </div>
                            <div class="field-row">
                                <field-input label="Судебные разбирательства" v-model="general.courtCases"></field-input>
                                <field-input label="Задолженность в МИБ" v-model="general.mibDebt"></field-input>
                                <field-select label="Изменения учредителей" v-model="general.founderChanges" editable
                                    :options="['Да', 'Нет']"></field-select>
                            </div>
                            <div class="field-row">
                                <field-select label="Вторичный р/счет" v-model="general.secondaryAccount" editable
                                    :options="['Да', 'Нет']"></field-select>
                                <div class="field-group"></div>
                                <div class="field-group"></div>
                            </div>
                        </div>

                        <app-table title="Просроченная задолженность по погашенным кредитам"
                            :columns="overdueClosedCols" :rows="overdueClosedRows" empty-text="Нет записей"></app-table>

                        <app-table title="Просроченная задолженность по действующим кредитам"
                            :columns="overdueActiveCols" :rows="overdueActiveRows" empty-text="Нет записей"></app-table>
                    </template>

                    <!-- Section 2: Информация по имеющимся кредитам -->
                    <template v-if="activeSection === 2">
                        <div class="section-title">Информация по имеющимся кредитам</div>
                        <app-table title="Кредиты"
                            :columns="creditsCols" :rows="creditsRows" empty-text="Нет записей"></app-table>
                    </template>

                    <!-- Section 3: Связанные предприятия -->
                    <template v-if="activeSection === 3">
                        <div class="section-title">Связанные предприятия</div>
                        <app-table title="Связанные предприятия"
                            :columns="relatedCols" :rows="relatedRows" empty-text="Нет записей"></app-table>
                    </template>

                    <!-- Section 4: Финансовое положение -->
                    <template v-if="activeSection === 4">
                        <div class="section-title">Финансовое положение</div>
                        <app-table title="Баланс (по нац. стандартам)"
                            :columns="balanceCols" :rows="balanceRows" empty-text="Нет данных"></app-table>
                        <app-table title="Форма №2 — Отчёт о финансовых результатах"
                            :columns="incomeCols" :rows="incomeRows" empty-text="Нет данных"></app-table>
                    </template>

                    <!-- Section 5: Долговая нагрузка -->
                    <template v-if="activeSection === 5">
                        <div class="section-title">Долговая нагрузка</div>
                        <div class="fields-section" style="border: none; padding: 0;">
                            <div class="field-row">
                                <field-input label="Среднемесячный платёж" v-model="debtLoad.monthlyPayment"></field-input>
                                <field-input label="Среднемесячный доход" v-model="debtLoad.monthlyIncome"></field-input>
                                <field-input label="Кредитная нагрузка (%)" v-model="debtLoad.loadPercent"></field-input>
                            </div>
                        </div>
                    </template>

                    <!-- Section 6: Обороты расчетного счёта -->
                    <template v-if="activeSection === 6">
                        <div class="section-title">Обороты расчетного счёта</div>
                        <app-table title="Обороты за 12 месяцев"
                            :columns="turnoverCols" :rows="turnoverRows" :footer-text="'Строк: ' + turnoverRows.length"></app-table>
                    </template>

                    <!-- Section 7: Отчёт по НДС -->
                    <template v-if="activeSection === 7">
                        <div class="section-title">Отчёт по НДС</div>
                        <app-table title="Выручка от реализации (НДС)"
                            :columns="vatCols" :rows="vatRows" :footer-text="'Строк: ' + vatRows.length"></app-table>
                    </template>

                    <!-- Section 8: Адрес деятельности -->
                    <template v-if="activeSection === 8">
                        <div class="section-title">Адрес деятельности</div>
                        <app-table title="Адреса деятельности"
                            :columns="addressCols" :rows="addressRows" empty-text="Нет записей"></app-table>
                    </template>

                    <!-- Section 9: Картотека-2 -->
                    <template v-if="activeSection === 9">
                        <div class="section-title">Картотека-2</div>
                        <div class="fields-section" style="border: none; padding: 0;">
                            <div class="field-row">
                                <field-input label="Сумма картотеки" v-model="kartoteka.amount"></field-input>
                                <div class="field-group"></div>
                                <div class="field-group"></div>
                            </div>
                            <template v-if="Number(kartoteka.amount) > 0">
                                <div class="field-row">
                                    <field-input label="Причина задолженности" v-model="kartoteka.reason" editable textarea required></field-input>
                                </div>
                                <div class="field-row">
                                    <field-input label="Сумма задолженности" v-model="kartoteka.debtAmount" editable required></field-input>
                                    <div class="field-group"></div>
                                    <div class="field-group"></div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Section 10: Исполнение решений -->
                    <template v-if="activeSection === 10">
                        <div class="section-title">Исполнение решений</div>
                        <div class="fields-section" style="border: none; padding: 0;">
                            <div class="field-row">
                                <field-input label="Коллегиальный орган" v-model="decisions.body"></field-input>
                                <field-input label="Дата и номер решения" v-model="decisions.decisionRef"></field-input>
                                <div class="field-group"></div>
                            </div>
                            <div class="field-row">
                                <field-input label="Условия решения" v-model="decisions.conditions" textarea></field-input>
                            </div>
                            <div class="field-row">
                                <field-input label="Исполнение условий" v-model="decisions.execution" editable textarea></field-input>
                            </div>
                        </div>
                    </template>

                    <!-- Section 11: Исполнение бизнес-плана -->
                    <template v-if="activeSection === 11">
                        <div class="section-title">Исполнение бизнес-плана</div>
                        <app-table title="Исполнение бизнес-плана"
                            :columns="bizPlanCols" :rows="bizPlanRows" :footer-text="'Строк: ' + bizPlanRows.length"></app-table>
                    </template>

                    <!-- Section 12: Ввод проекта -->
                    <template v-if="activeSection === 12">
                        <div class="section-title">Ввод проекта</div>
                        <div class="fields-section" style="border: none; padding: 0;">
                            <div class="field-row">
                                <field-input label="Срок ввода (план)" v-model="projectLaunch.planDate"></field-input>
                                <field-input label="Срок ввода (факт)" v-model="projectLaunch.factDate" editable></field-input>
                                <div class="field-group"></div>
                            </div>
                            <div class="field-row" v-if="!projectLaunch.factDate">
                                <field-input label="Причина невведения" v-model="projectLaunch.reason" editable textarea></field-input>
                            </div>
                        </div>
                    </template>

                    <!-- Section 13: Обеспечение -->
                    <template v-if="activeSection === 13">
                        <div class="section-title">Обеспечение</div>
                        <app-table title="Имущественное обеспечение"
                            :columns="collateralPropCols" :rows="collateralPropRows" empty-text="Нет записей"></app-table>
                        <app-table title="Неимущественное обеспечение"
                            :columns="collateralNonPropCols" :rows="collateralNonPropRows" empty-text="Нет записей"></app-table>
                    </template>

                </div>
            </div>

            <!-- Bottom buttons -->
            <div class="action-buttons">
                <app-btn label="Сохранить" primary @click="onSave"></app-btn>
                <app-btn label="Сформировать документ" @click="onGenerate"></app-btn>
                <app-btn label="Назад" @click="goBack"></app-btn>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.0/dist/vue.global.prod.js"></script>
    <script src="src/components/components.js"></script>
    <script>

        const app = createApp({

                const pageTabs = ref([

                // Sidebar sections (13)
